<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="img-box">
            <img src="./transparent.png" width="100%" >
            <div class="img-wrap">
                <img src="./original.jpg" id="original-img">

            </div>
            <span id="line">
                <img src="./arrow.png" class="arrow">
            </span>
        </div>
    </div>
    <script>
        let img_container = document.querySelector(".img-box");
        let bg_img = document.querySelector(".img-wrap");
        let with_bg_img = document.getElementById("original-img");
        let line = document.getElementById("line");

        with_bg_img.style.width = img_container.offsetWidth + "px";

        let left_space = img_container.offsetLeft;

        img_container.onmousemove = function (e) {
            let bx_wid = (e.pageX - left_space) + "px";
            bg_img.style.width = bx_wid;
            line.style.left = bx_wid;
        }
    </script>
</body>
</html>
